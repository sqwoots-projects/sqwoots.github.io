<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Briefing</title>

  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .wrap {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h1 { font-size: 24px; }
    h2 { font-size: 18px; margin-top: 0; }

    a { text-decoration: none; color: black; font-weight: bold; }
    .source { color: gray; font-size: 14px; }
  </style>
</head>

<body>

<div class="wrap">
  <h1>Daily Briefing</h1>

  <div class="card">
    <h2>🌤 Weather</h2>
    <div id="weather"></div>
  </div>

  <div class="card">
    <h2>🧠 AI News</h2>
    <div id="ai"></div>
  </div>

  <div class="card">
    <h2>🌍 World News</h2>
    <div id="world"></div>
  </div>
</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    document.getElementById("weather").innerText = data.weather;

    const aiDiv = document.getElementById("ai");
    data.ai.forEach(item => {
      aiDiv.innerHTML += `
        <div>
          <a href="${item.url}" target="_blank">${item.title}</a>
          <div class="source">${item.source}</div>
        </div>
      `;
    });

    const worldDiv = document.getElementById("world");
    data.world.forEach(item => {
      worldDiv.innerHTML += `
        <div>
          <a href="${item.url}" target="_blank">${item.title}</a>
          <div class="source">${item.source}</div>
        </div>
      `;
    });

  });
</script>

</body>
</html>
