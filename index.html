<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Briefing</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #111827;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .item {
      padding: 10px 0;
      border-top: 1px solid #eee;
    }

    .item:first-child {
      border-top: none;
      padding-top: 0;
    }

    a {
      color: #111827;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .source {
      color: #6b7280;
      font-size: 14px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Daily Briefing</h1>
    <div class="subtitle">AI news, world news, and weather</div>

    <div class="card">
      <h2>🌤 Weather</h2>
      <div>Seoul — 12°C, Cloudy</div>
    </div>

    <div class="card">
      <h2>🧠 AI News</h2>
      <div class="item">
        <a href="#">Sample AI headline 1</a>
        <div class="source">Source name</div>
      </div>
      <div class="item">
        <a href="#">Sample AI headline 2</a>
        <div class="source">Source name</div>
      </div>
    </div>

    <div class="card">
      <h2>🌍 World News</h2>
      <div class="item">
        <a href="#">Sample world headline 1</a>
        <div class="source">Source name</div>
      </div>
      <div class="item">
        <a href="#">Sample world headline 2</a>
        <div class="source">Source name</div>
      </div>
    </div>
  </div>
</body>
</html>
